services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: gridwatch
      POSTGRES_USER: gridwatch
      POSTGRES_PASSWORD: gridwatch
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwatch -d gridwatch"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - gridwatch-db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.2.19
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "curl -s localhost:9644/v1/status/ready | grep 'ready'"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/gridwatch
      KC_DB_USERNAME: gridwatch
      KC_DB_PASSWORD: gridwatch
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    environment:
      DATABASE_URL: postgres://gridwatch:gridwatch@db:5432/gridwatch
      PORT: 3000
      CSMS_WEBHOOK_SECRET: local-dev-secret
      KAFKA_BROKERS: redpanda:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: gridwatch
      KEYCLOAK_CLIENT_ID: gridwatch-api
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run migrate &&
             npm run seed &&
             npm run ingest:fixtures &&
             npm run start"

volumes:
  gridwatch-db:
